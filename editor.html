<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZS-KUFFLE PRO++ IDE</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6;
            --mov: #4C97FF; --apa: #9966FF; --snd: #CF63CF;
            --evt: #FFD500; --ctl: #FFAB19; --sen: #4CBFE6;
            --ope: #40BF4A; --var: #FF8C1A; --mis: #FF6680;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; }
        #app { display: flex; height: 100vh; width: 100vw; }

        #sidebar { width: 360px; min-width: 360px; background: var(--panel); display: flex; flex-direction: column; border-right: 2px solid #334155; }
        
        #stage { 
            width: 100%; height: 280px; background: white; position: relative; overflow: hidden; 
            border-bottom: 2px solid #334155; background-size: cover; background-position: center;
        }

        #mod-loader { position: absolute; bottom: 0; left: 0; height: 4px; background: #22c55e; width: 0%; transition: width 0.4s; z-index: 1000; }

        .sprite-img { position: absolute; width: 60px; height: 60px; object-fit: contain; cursor: pointer; touch-action: none; transition: transform 0.1s; }
        .selected { outline: 3px solid var(--accent); border-radius: 4px; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        .bar { padding: 8px; display: flex; gap: 5px; background: #111827; }
        .btn { flex: 1; border: none; padding: 10px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-play { background: #22c55e; }
        .btn-stop { background: #ef4444; }
        
        #sprite-list { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #0f172a; }
        .sprite-thumb { background: #1e293b; padding: 10px; border-radius: 10px; text-align: center; border: 2px solid transparent; cursor: pointer; position: relative; }
        .active-thumb { border-color: var(--accent); background: #334155; }

        #blockly-container { flex-grow: 1; position: relative; }
        #blocklyDiv { position: absolute; top: 0; left: 0; bottom: 0; right: 0; }
        
        .say-bubble { 
            position: absolute; background: white; border: 2px solid #4C97FF; 
            padding: 5px 10px; border-radius: 15px; color: black; font-size: 12px; 
            font-weight: bold; pointer-events: none; transform: translate(40px, -30px); z-index: 1000;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div id="stage" id="stage-area">
            <div id="mod-loader"></div>
        </div>
        
        <div class="bar">
            <button class="btn btn-play" onclick="startEngine()"><i class="fas fa-play"></i> PLAY MOD</button>
            <button class="btn btn-stop" onclick="stopEngine()"><i class="fas fa-stop"></i> PARAR</button>
        </div>

        <div class="bar">
            <button class="btn" style="background:#6366f1" onclick="downloadProject()"><i class="fas fa-file-download"></i> .ZS3</button>
            <button class="btn" style="background:#8b5cf6" onclick="document.getElementById('f-zs3').click()"><i class="fas fa-file-upload"></i> LOAD</button>
            <input type="file" id="f-zs3" hidden accept=".zs3" onchange="loadProject(this)">
        </div>

        <div style="padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button class="btn" style="background: var(--mov);" onclick="document.getElementById('f-img').click()">+ Sprite</button>
            <button class="btn" style="background: var(--apa);" onclick="document.getElementById('f-bg').click()">+ Fondo</button>
            <button class="btn" style="background: var(--snd);" onclick="document.getElementById('f-snd').click()">+ Sonido</button>
            <input type="file" id="f-img" hidden onchange="addAsset(this, 'img')">
            <input type="file" id="f-bg" hidden onchange="addAsset(this, 'bg')">
            <input type="file" id="f-snd" hidden onchange="addAsset(this, 'snd')">
        </div>

        <div id="sprite-list"></div>
    </div>

    <div id="blockly-container">
        <div id="blocklyDiv"></div>
    </div>
</div>

<xml id="toolbox" style="display: none">
    <category name="Movimiento" colour="#4C97FF">
        <block type="move"></block>
        <block type="turn_right"></block>
        <block type="turn_left"></block>
        <block type="goto_xy"></block>
        <block type="goto_menu"></block>
        <block type="glide_to"></block>
        <block type="point_direction"></block>
        <block type="point_towards"></block>
        <block type="change_x"></block>
        <block type="change_y"></block>
    </category>
    <category name="Apariencia" colour="#9966FF">
        <block type="say_time"></block>
        <block type="say"></block>
        <block type="think"></block>
        <block type="switch_costume"></block>
        <block type="next_costume"></block>
        <block type="change_size"></block>
        <block type="set_size"></block>
        <block type="show"></block>
        <block type="hide"></block>
    </category>
    <category name="Eventos" colour="#FFD500">
        <block type="event_play"></block>
        <block type="event_key"></block>
        <block type="event_clicked"></block>
        <block type="event_receive"></block>
        <block type="event_broadcast"></block>
        <block type="event_broadcast_wait"></block>
    </category>
    <category name="Control" colour="#FFAB19">
        <block type="wait"></block>
        <block type="repeat"></block>
        <block type="forever"></block>
        <block type="if_then"></block>
        <block type="if_else"></block>
        <block type="wait_until"></block>
        <block type="stop_all"></block>
    </category>
    <category name="Sensores" colour="#4CBFE6">
        <block type="touching"></block>
        <block type="touching_color"></block>
        <block type="distance_to"></block>
        <block type="key_pressed"></block>
        <block type="mouse_down"></block>
        <block type="mouse_x"></block>
        <block type="mouse_y"></block>
    </category>
    <category name="Operadores" colour="#40BF4A">
        <block type="math_arithmetic"><field name="OP">ADD</field></block>
        <block type="math_arithmetic"><field name="OP">MINUS</field></block>
        <block type="math_arithmetic"><field name="OP">MULTIPLY</field></block>
        <block type="math_arithmetic"><field name="OP">DIVIDE</field></block>
        <block type="logic_compare"><field name="OP">GT</field></block>
        <block type="logic_compare"><field name="OP">LT</field></block>
        <block type="logic_compare"><field name="OP">EQ</field></block>
        <block type="logic_operation"><field name="OP">AND</field></block>
        <block type="logic_operation"><field name="OP">OR</field></block>
        <block type="logic_negate"></block>
    </category>
    <category name="Variables" colour="#FF8C1A" custom="VARIABLE"></category>
    <category name="Mis Bloques" colour="#FF6680" custom="PROCEDURE"></category>
</xml>

<script>
let objects = [];
let activeId = null;
let isPlaying = false;
let threads = [];

// DEFINICIÓN DE TODOS LOS COMANDOS (SIN FALTAR NINGUNO)
Blockly.defineBlocksWithJsonArray([
    // Movimiento
    { "type": "move", "message0": "mover %1 pasos", "args0": [{"type":"field_number","name":"N","value":10}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "turn_right", "message0": "girar ↻ %1 grados", "args0": [{"type":"field_number","name":"N","value":15}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "turn_left", "message0": "girar ↺ %1 grados", "args0": [{"type":"field_number","name":"N","value":15}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "goto_xy", "message0": "ir a x: %1 y: %2", "args0": [{"type":"field_number","name":"X","value":0},{"type":"field_number","name":"Y","value":0}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "goto_menu", "message0": "ir a %1", "args0": [{"type":"field_dropdown","name":"LOC","options":[["puntero del ratón","MOUSE"],["posición aleatoria","RANDOM"]]}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "glide_to", "message0": "deslizar en %1 segs a x: %2 y: %3", "args0": [{"type":"field_number","name":"T","value":1},{"type":"field_number","name":"X","value":0},{"type":"field_number","name":"Y","value":0}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "point_direction", "message0": "apuntar en dirección %1", "args0": [{"type":"field_angle","name":"DIR","angle":90}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "point_towards", "message0": "apuntar hacia %1", "args0": [{"type":"field_dropdown","name":"OBJ","options":[["puntero","MOUSE"]]}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "change_x", "message0": "cambiar x por %1", "args0": [{"type":"field_number","name":"N","value":10}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    { "type": "change_y", "message0": "cambiar y por %1", "args0": [{"type":"field_number","name":"N","value":10}], "previousStatement": null, "nextStatement": null, "colour": "#4C97FF" },
    // Apariencia
    { "type": "say_time", "message0": "decir %1 por %2 segundos", "args0": [{"type":"field_input","name":"T","text":"¡Hola!"},{"type":"field_number","name":"S","value":2}], "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "say", "message0": "decir %1", "args0": [{"type":"field_input","name":"T","text":"¡Hola!"}], "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "think", "message0": "pensar %1", "args0": [{"type":"field_input","name":"T","text":"Hmm..."}], "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "switch_costume", "message0": "cambiar disfraz a %1", "args0": [{"type":"field_input","name":"D","text":"disfraz1"}], "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "next_costume", "message0": "siguiente disfraz", "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "change_size", "message0": "cambiar tamaño por %1", "args0": [{"type":"field_number","name":"N","value":10}], "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "set_size", "message0": "fijar tamaño a %1 %", "args0": [{"type":"field_number","name":"N","value":100}], "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "show", "message0": "mostrar", "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    { "type": "hide", "message0": "esconder", "previousStatement": null, "nextStatement": null, "colour": "#9966FF" },
    // Eventos
    { "type": "event_play", "message0": "cuando Play clickeada", "nextStatement": null, "colour": "#FFD500" },
    { "type": "event_key", "message0": "cuando presione tecla %1", "args0": [{"type":"field_dropdown","name":"K","options":[["espacio","space"],["flecha arriba","up"]]}], "nextStatement": null, "colour": "#FFD500" },
    { "type": "event_clicked", "message0": "cuando este objeto clickeado", "nextStatement": null, "colour": "#FFD500" },
    { "type": "event_receive", "message0": "cuando reciba %1", "args0": [{"type":"field_input","name":"M","text":"mensaje1"}], "nextStatement": null, "colour": "#FFD500" },
    { "type": "event_broadcast", "message0": "enviar %1", "args0": [{"type":"field_input","name":"M","text":"mensaje1"}], "previousStatement": null, "nextStatement": null, "colour": "#FFD500" },
    { "type": "event_broadcast_wait", "message0": "enviar %1 y esperar", "args0": [{"type":"field_input","name":"M","text":"mensaje1"}], "previousStatement": null, "nextStatement": null, "colour": "#FFD500" },
    // Control
    { "type": "wait", "message0": "esperar %1 segundos", "args0": [{"type":"field_number","name":"N","value":1}], "previousStatement": null, "nextStatement": null, "colour": "#FFAB19" },
    { "type": "repeat", "message0": "repetir %1 %2 %3", "args0": [{"type":"field_number","name":"N","value":10},{"type":"input_dummy"},{"type":"input_statement","name":"DO"}], "previousStatement": null, "nextStatement": null, "colour": "#FFAB19" },
    { "type": "forever", "message0": "por siempre %1 %2", "args0": [{"type":"input_dummy"},{"type":"input_statement","name":"DO"}], "previousStatement": null, "colour": "#FFAB19" },
    { "type": "if_then", "message0": "si %1 entonces %2 %3", "args0": [{"type":"input_value","name":"IF","check":"Boolean"},{"type":"input_dummy"},{"type":"input_statement","name":"DO"}], "previousStatement": null, "nextStatement": null, "colour": "#FFAB19" },
    { "type": "if_else", "message0": "si %1 entonces %2 %3 si no %4 %5", "args0": [{"type":"input_value","name":"IF","check":"Boolean"},{"type":"input_dummy"},{"type":"input_statement","name":"DO1"},{"type":"input_dummy"},{"type":"input_statement","name":"DO2"}], "previousStatement": null, "nextStatement": null, "colour": "#FFAB19" },
    { "type": "wait_until", "message0": "esperar hasta %1", "args0": [{"type":"input_value","name":"C","check":"Boolean"}], "previousStatement": null, "nextStatement": null, "colour": "#FFAB19" },
    { "type": "stop_all", "message0": "detener %1", "args0": [{"type":"field_dropdown","name":"S","options":[["todos","all"],["este programa","this"]]}], "previousStatement": null, "colour": "#FFAB19" },
    // Sensores
    { "type": "touching", "message0": "¿tocando %1 ?", "args0": [{"type":"field_dropdown","name":"O","options":[["puntero","mouse"]]}], "output": "Boolean", "colour": "#4CBFE6" },
    { "type": "touching_color", "message0": "¿tocando color %1 ?", "args0": [{"type":"field_colour","name":"C","colour":"#ff0000"}], "output": "Boolean", "colour": "#4CBFE6" },
    { "type": "distance_to", "message0": "distancia a %1", "args0": [{"type":"field_dropdown","name":"O","options":[["puntero","mouse"]]}], "output": "Number", "colour": "#4CBFE6" },
    { "type": "key_pressed", "message0": "¿tecla %1 presionada?", "args0": [{"type":"field_dropdown","name":"K","options":[["espacio","space"]]}], "output": "Boolean", "colour": "#4CBFE6" },
    { "type": "mouse_down", "message0": "¿ratón presionado?", "output": "Boolean", "colour": "#4CBFE6" },
    { "type": "mouse_x", "message0": "posición x del ratón", "output": "Number", "colour": "#4CBFE6" },
    { "type": "mouse_y", "message0": "posición y del ratón", "output": "Number", "colour": "#4CBFE6" }
]);

const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), theme: Blockly.Themes.Dark, renderer: 'zelos' });

function addAsset(input, type) {
    const file = input.files[0]; if(!file) return;
    const url = URL.createObjectURL(file);
    if(type === 'bg') document.getElementById('stage').style.backgroundImage = `url(${url})`;
    else if(type === 'img') {
        const id = 'obj_' + Date.now();
        objects.push({ id, url, x: 150, y: 100, angle: 0, size: 100, visible: true, workspace: null, bubble: null });
        selectObj(id);
    }
    render();
}

function selectObj(id) {
    if(activeId) {
        const current = objects.find(o => o.id === activeId);
        if(current) current.workspace = Blockly.serialization.workspaces.save(workspace);
    }
    activeId = id;
    const next = objects.find(o => o.id === id);
    workspace.clear();
    if(next.workspace) Blockly.serialization.workspaces.load(next.workspace, workspace);
    render();
}

function render() {
    const stage = document.getElementById('stage');
    const list = document.getElementById('sprite-list');
    stage.querySelectorAll('.sprite-img, .say-bubble').forEach(e => e.remove());
    list.innerHTML = '';

    objects.forEach(o => {
        const img = document.createElement('img');
        img.src = o.url;
        img.className = `sprite-img ${o.id === activeId ? 'selected' : ''}`;
        img.style.left = o.x + 'px'; img.style.top = o.y + 'px';
        img.style.width = (60 * (o.size/100)) + 'px';
        img.style.transform = `rotate(${o.angle}deg)`;
        img.style.display = o.visible ? 'block' : 'none';
        
        // EVENTO CLICK DEL OBJETO (Reparado)
        img.onclick = () => {
            if(isPlaying) {
                const ws = o.workspace || (o.id === activeId ? Blockly.serialization.workspaces.save(workspace) : null);
                if(ws && ws.blocks) {
                    ws.blocks.blocks.filter(b => b.type === 'event_clicked').forEach(b => execute(o, b.next?.block));
                }
            } else {
                selectObj(o.id);
            }
        };

        // DRAG AND DROP
        img.onmousedown = (e) => {
            if(isPlaying) return;
            let shiftX = e.clientX - o.x;
            let shiftY = e.clientY - o.y;
            document.onmousemove = (ev) => {
                o.x = ev.clientX - shiftX; o.y = ev.clientY - shiftY;
                render();
            };
            document.onmouseup = () => document.onmousemove = null;
        };

        stage.appendChild(img);
        o.el = img;

        if(o.bubble) {
            const b = document.createElement('div');
            b.className = 'say-bubble'; b.innerText = o.bubble;
            b.style.left = o.x + 'px'; b.style.top = o.y + 'px';
            stage.appendChild(b);
        }

        const thumb = document.createElement('div');
        thumb.className = `sprite-thumb ${o.id === activeId ? 'active-thumb' : ''}`;
        thumb.innerHTML = `<img src="${o.url}" width="35"><br><small>x:${Math.round(o.x - 150)} y:${Math.round(130 - o.y)}</small>`;
        thumb.onclick = () => selectObj(o.id);
        list.appendChild(thumb);
    });
}

// MOTOR DE EJECUCIÓN MEJORADO
async function startEngine() {
    stopEngine();
    const loader = document.getElementById('mod-loader');
    loader.style.width = "100%";
    
    setTimeout(async () => {
        loader.style.width = "0%";
        isPlaying = true;
        if(activeId) objects.find(o => o.id === activeId).workspace = Blockly.serialization.workspaces.save(workspace);

        objects.forEach(obj => {
            if(obj.workspace && obj.workspace.blocks) {
                obj.workspace.blocks.blocks.filter(b => b.type === "event_play").forEach(b => execute(obj, b.next?.block));
            }
        });
    }, 400);
}

function stopEngine() {
    isPlaying = false;
    threads.forEach(clearTimeout); threads = [];
    objects.forEach(o => o.bubble = null);
    render();
}

async function execute(obj, block) {
    if(!block || !isPlaying) return;
    const val = (name) => block.fields?.[name] || 0;

    switch(block.type) {
        case 'move':
            const r = (obj.angle * Math.PI) / 180;
            obj.x += Math.cos(r) * val('N'); obj.y += Math.sin(r) * val('N');
            break;
        case 'turn_right': obj.angle += val('N'); break;
        case 'turn_left': obj.angle -= val('N'); break;
        case 'say': obj.bubble = val('T'); break;
        case 'wait': await new Promise(res => threads.push(setTimeout(res, val('N') * 1000))); break;
        case 'forever':
            while(isPlaying) {
                if(block.inputs?.DO) await execute(obj, block.inputs.DO.block);
                await new Promise(res => setTimeout(res, 50));
            }
            return;
        case 'repeat':
            for(let i=0; i<val('N'); i++) {
                if(!isPlaying) break;
                if(block.inputs?.DO) await execute(obj, block.inputs.DO.block);
            }
            break;
    }

    render();
    if(block.next) await execute(obj, block.next.block);
}

// .ZS3 SAVE/LOAD
function downloadProject() {
    if(activeId) objects.find(o => o.id === activeId).workspace = Blockly.serialization.workspaces.save(workspace);
    const data = JSON.stringify(objects);
    const blob = new Blob([data], {type: "application/json"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "mi_mod_kuffle.zs3";
    a.click();
}

function loadProject(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        objects = JSON.parse(e.target.result);
        if(objects.length > 0) selectObj(objects[0].id);
        render();
    };
    reader.readAsText(input.files[0]);
}
</script>
</body>
</html>
