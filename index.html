<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cargando Editor</title>

<style>
body{
    margin:0;
    background:#3f5b8f;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

.logo{
    width:300px;
    margin-bottom:40px;
}

.barra{
    width:300px;
    height:20px;
    background:#2e4170;
    border-radius:10px;
    overflow:hidden;
}

.progreso{
    height:100%;
    width:0%;
    background:#3aa0ff;
    animation:cargar 3s linear forwards;
}

@keyframes cargar{
    from{width:0%;}
    to{width:100%;}
}
</style>
</head>

<body>

<img src="ZS-KUFFLELogo.png" class="logo">

<div class="barra">
<div class="progreso"></div>
</div>

<script>
setTimeout(function(){
    window.location.href="editor.html";
},3000);
</script>

</body>
</html>
